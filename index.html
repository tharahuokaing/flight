<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ផែនទីពិភពលោកសម្រាប់ស្វែងរកដ្រូន</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>ប្រព័ន្ធតាមដានយន្តហោះនិងដ្រូនផ្សាយផ្ទាល់</h1>

  <div class="map-container">
    <div class="hologram-effect"></div>
    <div class="scanline"></div>

    <iframe
      class="map-iframe"
      src="https://globe.adsbexchange.com/?hideButtons=1&hideSideBar=1&enableLabels=1&type=UAV.*|MQ.*|RQ.*|GH.*"
      loading="lazy">
    </iframe>
  </div>

  <script src="script.js"></script>

  <h1>ប្រព័ន្ធតាមដានយន្តនិងហោះដ្រូនផ្សាយផ្ទាល់</h1>

  <div class="map-container">
    <div class="hologram-effect"></div>
    <div class="scanline"></div>

    <iframe
      class="map-iframe"
      src="https://www.flightradar24.com/13.06,93.10/5"
      loading="lazy">
    </iframe>
  </div>
  
  <script src="script1.js"></script>
</body>
</html>
