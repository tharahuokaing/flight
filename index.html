<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ផែនទីពិភពលោកសម្រាប់ស្វែងរកយន្តហោះ</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--cyber-primary:#00f9ff;
--cyber-secondary:#ff00ff;
--cyber-dark:#001428;
--cyber-glow:rgba(0,249,255,0.5);
}

body{
font-family:'Orbitron','Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
margin:0;
padding:20px;
background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
color:#e2e2e2;
min-height:100vh;
overflow-x:hidden;
display:flex;
flex-direction:column;
}

/* TITLE */

h1{
text-align:center;
color:var(--cyber-primary);
margin-bottom:30px;
text-shadow:0 0 10px var(--cyber-glow);
font-size:2.5rem;
}

/* MAIN MAP */

.map-container{
position:relative;
width:100%;
max-width:1200px;
height:600px;
margin:0 auto;
overflow:hidden;
border-radius:15px;

box-shadow:
0 0 20px var(--cyber-primary),
0 0 40px var(--cyber-secondary),
inset 0 0 30px rgba(0,0,0,0.5);

background-color:rgba(0,0,0,0.3);
backdrop-filter:blur(5px);

border:2px solid var(--cyber-primary);
}

/* HOLOGRAM GRID */

.hologram-effect{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:2;

background:
linear-gradient(90deg,transparent 48%,rgba(0,249,255,0.1) 49%,rgba(0,249,255,0.1) 51%,transparent 52%),
linear-gradient(transparent 48%,rgba(255,0,255,0.1) 49%,rgba(255,0,255,0.1) 51%,transparent 52%);

background-size:50px 50px;
opacity:.7;
mix-blend-mode:overlay;
}

/* SCANLINE */

.scanline{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:3;

background:linear-gradient(180deg,transparent 0%,rgba(0,249,255,0.1) 50%,transparent 100%);
background-size:100% 3px;

animation:scan 6s linear infinite;
opacity:.5;
}

@keyframes scan{
0%{transform:translateY(-100%);}
100%{transform:translateY(100%);}
}

/* MAP */

.map-iframe{
position:relative;
z-index:1;
width:100%;
height:100%;
border:none;
filter:brightness(1.2) contrast(1.1) saturate(1.2);
}

/* SIDE HUD MAP */

.menu-bottom-container{

position:fixed;

top:50%;
right:20px;

transform:translateY(-50%);

width:420px;
max-width:90%;

display:flex;
justify-content:center;
align-items:center;

z-index:2000;

}

.hologram-modal{

position:relative;
width:100%;

background:rgba(0,20,40,0.85);

border:1px solid rgba(0,255,255,0.4);

box-shadow:0 0 15px rgba(0,255,255,0.3);

backdrop-filter:blur(8px);

padding:15px;

border-radius:12px;

color:#00ffff;

overflow:hidden;
}

.holo-title{
text-align:center;
margin-bottom:10px;
font-weight:bold;
font-size:1.1em;
text-shadow:0 0 8px #00ffff;
}

.map-wrapper{
position:relative;
width:100%;
height:220px;
border-radius:8px;
overflow:hidden;
border:1px solid rgba(0,255,255,0.2);
}

/* MINI MAP SCAN */

.scan-line{
position:absolute;
top:0;
left:0;
width:100%;
height:2px;
background:#00ffff;
animation:scan-process 3s linear infinite;
}

@keyframes scan-process{
0%{top:0%;opacity:0;}
10%{opacity:1;}
90%{opacity:1;}
100%{top:100%;opacity:0;}
}

</style>

</head>

<body>

<h1>ផែនទីពិភពលោកសម្រាប់ស្វែងរកយន្តហោះ</h1>

<div class="map-container">

<div class="hologram-effect"></div>
<div class="scanline"></div>

<iframe
class="map-iframe"
src="https://www.flightradar24.com/29.32,35.34/4"
loading="lazy">
</iframe>

</div>

<!-- SIDE CYBER MAP -->

<div class="menu-bottom-container">

<div class="hologram-modal">

<div class="holo-title">
ផែនទីពិភពលោកសម្រាប់ស្វែងរកយន្តហោះ
</div>

<div class="map-wrapper">

<iframe
src="https://www.flightradar24.com/29.32,35.34/4"
width="100%"
height="100%"
style="border:0;filter:hue-rotate(170deg) invert(1) contrast(1.5) opacity(.35);"
loading="lazy">
</iframe>

<div class="scan-line"></div>

<iframe
class="map-iframe"
src="https://www.flightradar24.com/maps/embed?pb=!1m0!3m2!1sen!2s!4v1715678901234!5m2!1skm!2s&z=2"
loading="lazy">
</iframe>

</div>

<!-- SIDE CYBER MAP -->

<div class="menu-bottom-container">

<div class="hologram-modal">

<div class="holo-title">
ផែនទីពិភពលោកសម្រាប់ស្វែងរកយន្តហោះ
</div>

<div class="map-wrapper">

<iframe
src="https://www.flightradar24.com/maps/embed?pb=!1m0!3m2!1sen!2s!4v1715678901234!5m2!1skm!2s&z=2"
width="100%"
height="100%"
style="border:0;filter:hue-rotate(170deg) invert(1) contrast(1.5) opacity(.35);"
loading="lazy">
</iframe>

<div class="scan-line"></div>

</div>

</div>

</div>

<script>

/* DISABLE RIGHT CLICK */
document.addEventListener("contextmenu",function(e){
e.preventDefault();
});

/* DISABLE DOUBLE CLICK */
document.addEventListener("dblclick",function(e){
e.preventDefault();
});

/* BLOCK INSPECT SHORTCUTS */

document.addEventListener("keydown",function(e){

if(e.key==="F12"){
e.preventDefault();
}

if(e.ctrlKey && e.shiftKey && e.key==="I"){
e.preventDefault();
}

if(e.ctrlKey && e.shiftKey && e.key==="J"){
e.preventDefault();
}

if(e.ctrlKey && e.shiftKey && e.key==="C"){
e.preventDefault();
}

if(e.ctrlKey && e.key==="u"){
e.preventDefault();
}

});

</script>

</body>
</html>
